{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block layout %}
<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background-color: #12171e; padding: 2rem;">
  <!-- Materially Dark Login Layout -->
  <div class="q-auth__card glass-card q-slide-up" style="max-width: 450px; width: 100%;text-align: center;">
    
    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2rem;text-align:left;">
      <div>
        <h2 style="font-size: 2rem; color: var(--q-text); margin-bottom: 0.25rem;">Sign in</h2>
        <p style="color: var(--q-text-secondary); font-size: 0.875rem;">To keep connected with us.</p>
      </div>
      <div style="width: 48px; height: 48px; background: var(--q-primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 1.5rem;">
        Df
      </div>
    </div>

    {% if form.errors %}
    <div style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:var(--q-radius);padding:0.75rem;margin-bottom:1rem;text-align:left;font-size:0.85rem;color:#f87171">
      <i data-lucide="alert-circle" style="width:14px;height:14px;vertical-align:middle;margin-right:4px"></i>
      Username atau password salah.
    </div>
    {% endif %}

    <form method="post" class="q-auth__form" id="login-form" style="text-align: left;">
      {% csrf_token %}
      <div style="margin-bottom: 1.25rem;">
        <label class="q-label" for="id_username">Username</label>
        <input type="text" name="username" class="q-input" id="id_username" placeholder="Masukkan username" required autofocus>
      </div>
      <div style="margin-bottom: 1.5rem;">
        <label class="q-label" for="id_password">Password</label>
        <input type="password" name="password" class="q-input" id="id_password" placeholder="Masukkan password" required>
      </div>
      <button type="submit" class="q-btn q-btn--primary q-btn--lg" style="width:100%;" id="btn-submit-login">
        Masuk
      </button>
    </form>

    <div style="margin-top: 1.5rem; text-align: left;">
      <a href="/accounts/register/" style="color: var(--q-primary); text-decoration: none; font-size: 0.875rem; font-weight: 500;">Create new account</a>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="q-toast-container" id="toast-container" style="position:fixed;top:20px;right:2rem;z-index:9999;"></div>
</div>
{% endblock %}
